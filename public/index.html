			const NewsChart = echarts.init(document.getElementById("NewsChart"));

			function renderNewsList(newsItems) {
				const titles = newsItems.map(n => n.title || '');
				const urls   = newsItems.map(n => n.url   || '');
				// ç”¨å€’åºè®©ç¬¬1æ¡åœ¨é¡¶ç«¯ï¼ˆECharts yè½´ä»Žä¸‹å¾€ä¸Šï¼‰
				const reversedTitles = titles.slice().reverse();
				const reversedUrls   = urls.slice().reverse();

				NewsChart.setOption({
					backgroundColor: 'transparent',
					grid: { top: 8, bottom: 4, left: 8, right: 8, containLabel: true },
					tooltip: {
						trigger: 'axis',
						axisPointer: { type: 'none' },
						formatter: function(params) {
							const idx = params[0].dataIndex;
							const url = reversedUrls[idx];
							return url
								? `<a href="${url}" target="_blank" style="color:#7ecfff">${reversedTitles[idx]}</a>`
								: reversedTitles[idx];
						}
					},
					xAxis: { show: false, max: newsItems.length },
					yAxis: {
						type: 'category',
						data: reversedTitles,
						axisLine: { show: false },
						axisTick: { show: false },
						axisLabel: {
							textStyle: { color: '#aee', fontSize: 11 },
							interval: 0,
							formatter: function(value) {
								return value.length > 20 ? value.substring(0, 20) + '…' : value;
							}
						}
					},
					series: [{
						type: 'bar',
						data: reversedTitles.map((_, i) => newsItems.length - i),
						barMaxWidth: 6,
						itemStyle: {
							normal: {
								color: function(params) {
									const idx = newsItems.length - 1 - params.dataIndex;
									if (idx < 3)  return '#f5a623';
									if (idx < 10) return '#4a90e2';
									return '#2a5298';
								}
							}
						},
						label: {
							show: true,
							position: 'insideLeft',
							color: '#fff',
							fontSize: 10,
							formatter: function(params) {
								const rank = newsItems.length - params.dataIndex;
								return rank <= 3 ? `TOP${rank}` : `${rank}`;
							}
						}
					}]
				});

				// ç‚¹å‡»è·³è½¬åŽŸæ–‡
				NewsChart.off('click');
				NewsChart.on('click', function(params) {
					const url = reversedUrls[params.dataIndex];
					if (url) window.open(url, '_blank');
				});
			}

			// ä¼˜å…ˆåŠ è½½ Python ç”Ÿæˆçš„ news.jsonï¼Œå›žé€€åˆ°å®žæ—¶ RSS
			fetch('/data/news.json')
				.then(r => r.ok ? r.json() : Promise.reject('no local file'))
				.then(data => renderNewsList(data))
				.catch(() => {
					fetch('https://www.buzzing.cc/feed.json')
						.then(r => r.json())
						.then(data => {
							const news = (data.items || []).slice(0, 50).map(item => ({
								title: item.title || '',
								url:   item.url   || ''
							}));
							renderNewsList(news);
						})
						.catch(err => console.error('æ–°é—»åŠ è½½å¤±è´¥:', err));
				});

			//åˆå§‹åŒ–echartså®žä¾‹
			// åˆå§‹åŒ–è¯äº‘å›¾
			const wordcloudChart = echarts.init(document.getElementById("wordChart"));

			function renderWordCloud(wordcloudData) {
				wordcloudChart.setOption({
					title: { text: 'æ–°é—»çƒ­è¯è¯äº‘', textStyle: { color: '#aef' } },
					series: [{
						type: 'wordCloud',
						gridSize: 16,
						sizeRange: [14, 80],
						rotationRange: [-45, 45],
						shape: 'pentagon',
						textStyle: {
							normal: {
								color: function () {
									return 'rgb(' + [
										Math.round(Math.random() * 200 + 55),
										Math.round(Math.random() * 200 + 55),
										255
									].join(',') + ')';
								}
							}
						},
						data: wordcloudData
					}]
				});
			}

			// ä¼˜å…ˆåŠ è½½ Python è„šæœ¬ç”Ÿæˆçš„è¯é¢‘ JSONï¼ˆå·²åŽ»åœç”¨è¯ã€æƒé‡å‡†ç¡®ï¼‰
			// è‹¥æ–‡ä»¶ä¸å­˜åœ¨åˆ™å›žé€€åˆ°å®žæ—¶ RSS æ‹‰å–
			fetch('/data/wordfreq.json')
				.then(r => r.ok ? r.json() : Promise.reject('no local file'))
				.then(data => renderWordCloud(data))
				.catch(() => {
					// å›žé€€ï¼šå®žæ—¶ä»Ž RSS æ‹‰å–å¹¶åœ¨å‰ç«¯è®¡ç®—è¯é¢‘
					const stopWords = new Set([
						'the','a','an','and','or','but','in','on','at','to','for','of',
						'is','are','was','were','be','by','from','with','this','that',
						'it','not','no','how','what','why','who','will','can','more',
						'have','has','do','does','did','just','all','also','over','new'
					]);
					Promise.all([
						'https://www.buzzing.cc/feed.json',
						'https://hn.buzzing.cc/feed.json',
						'https://news.buzzing.cc/feed.json'
					].map(u => fetch(u).then(r => r.json()).catch(() => ({ items: [] }))))
						.then(datas => {
							const freq = {};
							datas.forEach(d => (d.items || []).forEach(item => {
								(item.title || '').match(/[a-zA-Z]{3,}/g || []).forEach(w => {
									const lw = w.toLowerCase();
									if (!stopWords.has(lw)) freq[lw] = (freq[lw] || 0) + 1;
								});
							}));
							renderWordCloud(Object.entries(freq).map(([name, value]) => ({ name, value })));
						});
				});
