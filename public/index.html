<!DOCTYPE html>

<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
	    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
		<title>新闻日报</title>
		<link rel="stylesheet" href="css/bootstrap.min.css" />
		<link rel="stylesheet" href="css/app.css" />
		<style>
			/* === RSS News Overlay on Fireworks === */
			#newsOverlay {
				position:absolute; top:0; left:0; right:0; bottom:0;
				z-index:10; display:flex; flex-direction:column;
			}
			#newsTabs {
				display:flex; flex-wrap:wrap; gap:5px;
				padding:10px 14px 6px;
				background:linear-gradient(180deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.35) 100%);
			}
			.news-tab {
				padding:3px 12px; border-radius:12px; font-size:11px;
				cursor:pointer; color:#8ab4d8; background:rgba(42,82,152,0.3);
				border:1px solid transparent; transition:all .2s; user-select:none;
				white-space:nowrap;
			}
			.news-tab:hover { background:rgba(42,82,152,0.5); color:#cde; }
			.news-tab.active {
				background:rgba(93,194,254,0.2); color:#5dc2fe;
				border-color:#5dc2fe; font-weight:bold;
			}
			.news-tab .tab-cnt { font-size:9px; opacity:0.6; margin-left:3px; }
			#newsContent {
				flex:1; overflow-y:auto; padding:4px 14px 10px;
				background:rgba(0,0,0,0.38);
			}
			#newsContent::-webkit-scrollbar { width:4px; }
			#newsContent::-webkit-scrollbar-thumb { background:rgba(93,194,254,0.4); border-radius:2px; }
			.news-item {
				padding:5px 0; border-bottom:1px solid rgba(93,194,254,0.1);
				display:flex; align-items:baseline; gap:6px;
			}
			.news-item:last-child { border-bottom:none; }
			.news-idx { min-width:18px; font-size:10px; color:#556; text-align:right; flex-shrink:0; }
			.news-item a {
				color:rgba(220,230,240,0.92); font-size:12px; text-decoration:none;
				line-height:1.5; word-break:break-all;
			}
			.news-item a:hover { color:#7ecfff; text-decoration:underline; }
			.news-src {
				margin-left:auto; font-size:9px; color:#4a6a8a;
				white-space:nowrap; flex-shrink:0;
			}
			.news-empty { color:#5a7a9a; text-align:center; padding:40px 0; font-size:12px; }
			#ballChart { position: relative; overflow: hidden; }
			/* 水球内天气信息容器 */
			.weather-info-container {
				position: absolute; inset: 0; z-index: 5;
				display: flex; flex-direction: column; align-items: center; justify-content: center;
				gap: 2px;
				pointer-events: none; padding: 4px 6px 10px; box-sizing: border-box;
				font-size: 11px; text-align: center;
				overflow: hidden;
				transform: translate(-24px, -18px);
			}
			/* 地点信息 */
			.weather-location {
				color: #7ecfff; font-size: 11px; letter-spacing: 0.5px;
				text-shadow: 0 0 4px rgba(0,0,0,0.3);
				min-height: 12px; line-height: 1.2; flex-shrink: 0;
			}
			/* 当前天气区域 */
			.weather-current-section {
				display: flex; flex-direction: column; align-items: center; gap: 2px;
				flex: 0 0 auto; justify-content: center;
			}
			.weather-center-icon {
				width: 50px; height: 50px;
				display: flex; align-items: center; justify-content: center;
				animation: weather-bounce 2s ease-in-out infinite;
				flex-shrink: 0;
			}
			.weather-center-icon img {
				width: 100%; height: 100%; object-fit: contain;
				filter: drop-shadow(0 0 4px rgba(126,207,255,0.3));
			}
			@keyframes weather-bounce {
				0%, 100% { transform: translateY(0) scale(1); }
				50% { transform: translateY(-3px) scale(1.03); }
			}
			.weather-temp-display {
				font-size: 24px; font-weight: bold; color: #7ecfff;
				line-height: 1; text-shadow: 0 0 6px rgba(126,207,255,0.3);
				margin: 0;
			}
			.weather-desc-display {
				font-size: 11px; color: #b8d8ff;
				text-shadow: 0 0 3px rgba(0,0,0,0.3);
				min-height: 11px;
			}
			.weather-metrics-inline {
				display: flex; gap: 4px; font-size: 9px; color: #8ab4d8;
				text-shadow: 0 0 2px rgba(0,0,0,0.3);
				margin: 1px 0 0 0;
			}
			.weather-metric-inline {
				display: flex; flex-direction: column; align-items: center; gap: 0.5px;
				min-width: 24px;
			}
			.weather-metric-inline-value {
				font-size: 10px; font-weight: bold; color: #5dc2fe;
			}
			/* 未来三天预报 */
			.weather-forecast-section {
				display: flex; gap: 2px; width: 82%; justify-content: center; flex-shrink: 0;
				margin-top: -1px;
			}
			.weather-forecast-day {
				flex: 1; min-width: 22px; padding: 1px 1px;
				border-radius: 0; background: transparent;
				font-size: 7px; color: #8ab4d8;
				text-shadow: 0 0 1px rgba(0,0,0,0.3);
				display: flex; flex-direction: column; align-items: center; gap: 0.5px;
			}
			.weather-forecast-day-date {
				font-size: 8px; color: #7ecfff; font-weight: bold;
			}
			.weather-forecast-day-icon {
				width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
				animation: weather-float 2.5s ease-in-out infinite;
			}
			.weather-forecast-day-icon img {
				width: 100%; height: 100%; object-fit: contain;
				filter: drop-shadow(0 0 2px rgba(126,207,255,0.2));
			}
			@keyframes weather-float {
				0%, 100% { transform: translateY(0); }
				50% { transform: translateY(-1.5px); }
			}
			.weather-forecast-day-desc {
				font-size: 7px; color: #b8d8ff; min-height: 8px; line-height: 1.05;
			}
			.weather-forecast-day-range {
				font-size: 7px; color: #7ecfff;
			}
			/* 词云模块改造：每日3首诗词横向滚动 */
			.poem-panel {
				height: 100%;
				box-sizing: border-box;
				padding: 12px;
				display: flex;
				align-items: center;
				justify-content: flex-start;
				overflow: hidden;
				position: relative;
			}
			.poem-panel::before {
				content: '';
				position: absolute;
				inset: 8% 6%;
				border-radius: 14px;
				background: radial-gradient(circle at 50% 0%, rgba(126, 207, 255, 0.18), rgba(12, 28, 58, 0.58) 65%);
				filter: blur(0.5px);
				animation: poemGlow 3.6s ease-in-out infinite;
			}
			.poem-marquee {
				position: relative;
				z-index: 1;
				width: 100%;
				overflow: hidden;
			}
			.poem-track {
				display: flex;
				align-items: stretch;
				gap: 16px;
				width: max-content;
				animation: poemFadeIn 0.7s ease-out;
				animation-name: poemFadeIn, poemMarquee;
				animation-duration: 0.7s, var(--poem-scroll-duration, 24s);
				animation-timing-function: ease-out, linear;
				animation-iteration-count: 1, infinite;
			}
			.poem-card {
				width: 252px;
				min-height: 228px;
				max-height: 86%;
				box-sizing: border-box;
				padding: 14px 12px;
				border-radius: 12px;
				border: 1px solid rgba(126, 207, 255, 0.25);
				background: rgba(8, 23, 48, 0.76);
				box-shadow: 0 4px 16px rgba(6, 20, 44, 0.3);
				display: flex;
				flex-direction: column;
				justify-content: flex-start;
				text-align: center;
				overflow: auto;
			}
			.poem-label {
				font-size: 11px;
				color: #7ecfff;
				letter-spacing: 1px;
				margin-bottom: 5px;
				font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
			}
			.poem-title {
				font-size: 18px;
				line-height: 1.35;
				font-weight: bold;
				color: #f6d365;
				letter-spacing: 1px;
				font-family: "STKaiti", "KaiTi", "Kaiti SC", "Noto Serif SC", serif;
			}
			.poem-author {
				font-size: 12px;
				color: #9fc5e8;
				margin: 4px 0 10px;
				letter-spacing: 1px;
				font-family: "FangSong", "STFangsong", "Songti SC", "Noto Serif SC", serif;
			}
			.poem-lines {
				width: 100%;
				border-top: 1px solid rgba(126, 207, 255, 0.25);
				padding-top: 8px;
			}
			.poem-line {
				font-size: 14px;
				line-height: 1.7;
				color: #d8e9ff;
				letter-spacing: 1px;
				font-family: "STSong", "Songti SC", "Noto Serif SC", serif;
				animation: poemLineFloat 2.8s ease-in-out infinite;
			}
			@keyframes poemFadeIn {
				from { opacity: 0; transform: translateY(10px); }
				to { opacity: 1; transform: translateY(0); }
			}
			@keyframes poemGlow {
				0%, 100% { opacity: 0.75; }
				50% { opacity: 1; }
			}
			@keyframes poemLineFloat {
				0%, 100% { transform: translateY(0); }
				50% { transform: translateY(-1px); }
			}
			@keyframes poemMarquee {
				from { transform: translateX(0); }
				to { transform: translateX(-50%); }
			}
			/* 诗词弹窗样式 */
			.poem-modal {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: rgba(0, 0, 0, 0.72);
				z-index: 9999;
				justify-content: center;
				align-items: center;
				padding: 20px;
				backdrop-filter: blur(2px);
			}
			.poem-modal.active {
				display: flex;
			}
			.poem-modal-content {
				background: linear-gradient(135deg, rgba(8,23,48,0.95) 0%, rgba(12,28,58,0.95) 100%);
				border: 1px solid rgba(126, 207, 255, 0.35);
				border-radius: 16px;
				padding: 32px 40px;
				max-width: 700px;
				width: 100%;
				max-height: 90vh;
				overflow-y: auto;
				box-shadow: 0 8px 32px rgba(6, 20, 44, 0.6), inset 0 1px 0 rgba(126, 207, 255, 0.12);
				animation: modalSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
			}
			.poem-modal-close {
				position: absolute;
				top: 16px;
				right: 20px;
				font-size: 28px;
				color: #7ecfff;
				cursor: pointer;
				background: none;
				border: none;
				padding: 0;
				width: 32px;
				height: 32px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 50%;
				transition: all 0.3s ease;
			}
			.poem-modal-close:hover {
				background: rgba(126, 207, 255, 0.15);
				color: #ffffff;
				transform: scale(1.1);
			}
			.poem-modal-title {
				font-size: 26px;
				font-weight: bold;
				color: #f6d365;
				text-align: center;
				margin-bottom: 8px;
				font-family: "STKaiti", "KaiTi", "Kaiti SC", serif;
				letter-spacing: 2px;
			}
			.poem-modal-title-pinyin {
				font-size: 12px;
				color: #9fc5e8;
				text-align: center;
				margin-bottom: 16px;
				font-family: Arial, sans-serif;
				letter-spacing: 1px;
			}
			.poem-modal-author {
				font-size: 13px;
				color: #7ecfff;
				text-align: center;
				margin-bottom: 24px;
				font-family: "FangSong", serif;
				letter-spacing: 1px;
			}
			.poem-modal-author-pinyin {
				font-size: 11px;
				color: #5ab1d8;
				text-align: center;
				font-family: Arial, sans-serif;
				margin-bottom: 20px;
			}
			.poem-modal-divider {
				height: 1px;
				background: rgba(126, 207, 255, 0.2);
				margin: 16px 0 20px;
			}
			.poem-modal-lines {
				display: flex;
				flex-direction: column;
				gap: 18px;
			}
			.poem-modal-line-group {
				text-align: center;
			}
			.poem-modal-line {
				font-size: 18px;
				line-height: 1.8;
				color: #d8e9ff;
				font-family: "STSong", "Songti SC", serif;
				letter-spacing: 2px;
				margin-bottom: 6px;
			}
			.poem-modal-line-pinyin {
				font-size: 11px;
				color: #7ecfff;
				font-family: Arial, "Helvetica Neue", sans-serif;
				letter-spacing: 1px;
				line-height: 1.6;
			}
			@keyframes modalSlideIn {
				from {
					opacity: 0;
					transform: scale(0.92) translateY(-20px);
				}
				to {
					opacity: 1;
					transform: scale(1) translateY(0);
				}
			}
			/* Ruby 拼音标注样式 */
			ruby {
				position: relative;
				font-size: inherit;
				line-height: 1;
			}
			rt {
				font-size: 0.55em;
				font-weight: normal;
				color: #7ecfff;
				line-height: 1;
				display: ruby-text;
			}
			.poem-modal-line-group ruby rt {
				font-size: 0.6em;
				color: #7ecfff;
			}
			/* 弹窗内容可复制样式 */
			.poem-modal-content {
				user-select: text;
				-webkit-user-select: text;
				-moz-user-select: text;
			}
			.poem-modal-copy-btn {
				position: absolute;
				top: 60px;
				right: 20px;
				padding: 8px 16px;
				background: rgba(126, 207, 255, 0.2);
				border: 1px solid rgba(126, 207, 255, 0.4);
				border-radius: 6px;
				color: #7ecfff;
				cursor: pointer;
				font-size: 12px;
				transition: all 0.3s ease;
				font-family: "Microsoft YaHei", sans-serif;
				z-index: 10;
			}
			.poem-modal-copy-btn:hover {
				background: rgba(126, 207, 255, 0.35);
				border-color: rgba(126, 207, 255, 0.6);
				transform: scale(1.05);
			}
			.poem-modal-copy-btn.copied {
				background: rgba(46, 204, 113, 0.3);
				border-color: rgba(46, 204, 113, 0.6);
				color: #2ecc71;
			}
		</style>
	</head>
	
	<body class="bg06">
		<header class="header">
			<h3>新闻日报</h3>

		<div class="wrapper">
			<div class="container-fluid">
				<div class="row fill-h">

					</div>
					<div class="col-lg-6 fill-h">

		<script type="text/javascript" src="js/jquery-3.3.1.min.js"></script>

			$(function() {

				const mapChart = echarts.init(document.getElementById("mapChart"));
				(function() {

						series: [{
							type: 'map',
							geoIndex: 0,
							data: data
						}]
					};
					mapChart.setOption(opt);
				})();
				
				/*************** 烟花秀 **************/
				//初始化echarts实例
				const fireworksChart = echarts.init(document.getElementById("fireworksChart"));
				(function() {
					let r = function(max) {
		                let m = max || 10;
		                return Math.floor(Math.random() * m);
		            };
		
		            let moonAndStars = {
		                type: 'graph',
		                data: (function() {
		                    let moonPosition = {
		                        x: 190,
		                        y: 0.5
		                    }
		                    let moon = [{
		                        symbolSize: 70,
		                        x: moonPosition.x,
		                        y: moonPosition.y
		                    }, {
		                        symbolSize: 60,
		                        x: moonPosition.x - 1.5,
		                        y: moonPosition.y - 1.5,
		                        itemStyle: {
		                            normal: {
		                                color: 'rgb(51, 51, 51)'
		                            }
		                        }
		                    }, {
		                        symbolSize: 0,
		                        x: 0,
		                        y: 0
		                    }, {
		                        symbolSize: 0,
		                        x: 200,
		                        y: 100
		                    }];
		                    let num = 100;
		                    let stars = [];
		                    for (let i = 0; i < num; i++) {
		                        stars.push({
		                            symbolSize: r(3),
		                            x: r(200),
		                            y: r(50)
		                        })
		                    }
		                    return moon.concat(stars);
		                })(),
		                itemStyle: {
		                    normal: {
		                        color: '#ccc'
		                    }
		                },
		                silent: true,
		                z: -1
		            };
		
		            let roofs = [
		                /*三角形*/
		                [1, 2, 3, 4, 5, 4, 3, 2, 1],
		                /*凸*/

				/*************** 烟花秀 — RSS新闻叠加 **************/
				(function() {
					var tabsEl = document.getElementById('newsTabs');
					var contentEl = document.getElementById('newsContent');
					if (!tabsEl || !contentEl) return;

					function formatArchivePath(date) {
						var year = date.getFullYear();
						var month = date.getMonth() + 1;
						var day = date.getDate();
						var mm = month < 10 ? '0' + month : '' + month;
						var dd = day < 10 ? '0' + day : '' + day;
						return 'data/' + year + '/' + month + '/news_' + year + '_' + mm + '_' + dd + '.json';
					}

					function getArchiveCandidates() {
						var today = new Date();
						var yesterday = new Date(today.getTime());
						yesterday.setDate(today.getDate() - 1);
						var todayPath = formatArchivePath(today);
						var yesterdayPath = formatArchivePath(yesterday);
						return [
							'/' + todayPath,
							todayPath,
							'/' + yesterdayPath,
							yesterdayPath,
							'/data/news.json',
							'data/news.json'
						];
					}

					function normalizeArchiveData(payload) {
						if (Array.isArray(payload) && payload.length && payload[0] && payload[0].title) {
							return payload;
						}
						if (!Array.isArray(payload) || !payload.length) return [];
						var latestSnapshot = payload[payload.length - 1] || {};
						return Array.isArray(latestSnapshot.items) ? latestSnapshot.items : [];
					}

					function renderArchive(payload) {
						var allNews = normalizeArchiveData(payload);
						if (!allNews || !allNews.length) {
							contentEl.innerHTML = '<div class="news-empty">暂无新闻数据</div>';
							return false;
						}

						var typeMap = {};
						var typeOrder = [];
						allNews.forEach(function(item) {
							var typeName = item.type || '其它';
							if (!typeMap[typeName]) {
								typeMap[typeName] = [];
								typeOrder.push(typeName);
							}
							typeMap[typeName].push(item);
						});
						typeOrder.sort(function(a, b) {
							return typeMap[b].length - typeMap[a].length;
						});

						var activeType = null;

						function escHtml(text) {
							var span = document.createElement('span');
							span.textContent = text || '';
							return span.innerHTML;
						}

						function escAttr(text) {
							return String(text || '')
								.replace(/&/g, '&amp;')
								.replace(/"/g, '&quot;')
								.replace(/</g, '&lt;')
								.replace(/>/g, '&gt;');
						}

						function renderTabs() {
							var html = '<span class="news-tab' + (activeType === null ? ' active' : '') + '" data-type="__all__">全部<span class="tab-cnt">' + allNews.length + '</span></span>';
							typeOrder.forEach(function(typeName) {
								var cls = activeType === typeName ? ' active' : '';
								html += '<span class="news-tab' + cls + '" data-type="' + escHtml(typeName) + '">' + escHtml(typeName) + '<span class="tab-cnt">' + typeMap[typeName].length + '</span></span>';
							});
							tabsEl.innerHTML = html;
						}

						function renderNews() {
							var items = activeType ? (typeMap[activeType] || []) : allNews;
							if (!items.length) {
								contentEl.innerHTML = '<div class="news-empty">暂无新闻</div>';
								return;
							}

							var html = '';
							items.forEach(function(item, index) {
								var title = escHtml(item.title || '');
								var source = escHtml(item.source || '');
								html += '<div class="news-item">' +
									'<span class="news-idx">' + (index + 1) + '</span>' +
									(item.url
										? '<a href="' + escAttr(item.url) + '" target="_blank" rel="noopener">' + title + '</a>'
										: '<span style="color:#cde;font-size:12px">' + title + '</span>') +
									(source ? '<span class="news-src">' + source + '</span>' : '') +
									'</div>';

							'data/weather.json',
							'./data/weather.json',
							'/data/weather.json',
							'public/data/weather.json',
							'./public/data/weather.json'
						];

						function tryFetchAt(index) {
							if (index >= candidates.length) {
								renderWeather(window.NEWSFLOW_WEATHER || null);
								return;
							}

							fetch(candidates[index], { cache: 'no-store' })
								.then(function(response) {
									if (!response.ok) {
										throw new Error('weather.json load failed: ' + response.status);
									}
									return response.json();
								})
								.then(function(data) {
									window.NEWSFLOW_WEATHER = data;
									renderWeather(data);
								})
								.catch(function() {
									tryFetchAt(index + 1);

				function getDailyPoems(count) {
					var now = new Date();
					var start = new Date(now.getFullYear(), 0, 1);
				var dayIndex = Math.floor((now - start) / 86400000);
				var size = count || 3;
				var begin = (dayIndex * size) % dailyPoems.length;
				var result = [];
				for (var i = 0; i < size; i += 1) {
					result.push(dailyPoems[(begin + i) % dailyPoems.length]);
				}
				return result;
			}

			function showPoemModal(poem) {
				if (!poem) return;
				initPoemModal();
				var modalBody = document.getElementById('poemModalBody');

				// Generate ruby HTML for text
				function generateRubyHtml(chars, rubies) {
					if (!rubies || !Array.isArray(rubies)) return escHtml(chars);
					return rubies.map(function(item) {
						if (Array.isArray(item)) {
							return '<ruby>' + escHtml(item[0]) + '<rt>' + escHtml(item[1]) + '</rt></ruby>';
						}
						return escHtml(item);
					}).join('');
				}

				// Generate title with ruby
				var titleHtml = poem.titleRuby && Array.isArray(poem.titleRuby)
					? generateRubyHtml(poem.title, poem.titleRuby)
					: escHtml(poem.title);

				// Generate author with ruby
				var authorHtml = poem.authorRuby && Array.isArray(poem.authorRuby)
					? generateRubyHtml(poem.author, poem.authorRuby)
					: escHtml(poem.author);

				// Generate poem lines with ruby
				var linesHtml = (poem.lines || []).map(function(line, idx) {
					var lineRubies = poem.lineRubies && poem.lineRubies[idx] ? poem.lineRubies[idx] : null;
					var lineHtml = lineRubies ? generateRubyHtml(line, lineRubies) : escHtml(line);
					return '<div class="poem-modal-line-group">'
						+ '<div class="poem-modal-line">' + lineHtml + '</div>'
						+ '</div>';
				}).join('');

				modalBody.innerHTML = ''
					+ '<div class="poem-modal-title">' + titleHtml + '</div>'
					+ '<div class="poem-modal-author">' + authorHtml + '</div>'
					+ '<div class="poem-modal-divider"></div>'

				document.body.style.overflow = 'hidden';

						document.body.removeChild(tempDiv);

						// Copy to clipboard
						canvas.toBlob(function(blob) {
							try {
								navigator.clipboard.write([
									new ClipboardItem({ 'image/png': blob })
								]).then(function() {
									// Show success message
									var copyBtn = document.getElementById('copyImageBtn');
									if (copyBtn) {
										var originalText = copyBtn.textContent;
										copyBtn.textContent = '✓ 已复制';
										copyBtn.classList.add('copied');
										setTimeout(function() {
											copyBtn.textContent = originalText;
											copyBtn.classList.remove('copied');
										}, 2000);
									}
								}).catch(function(err) {
									alert('复制失败，请重试');
									console.error('Clipboard error:', err);
								});
							} catch (e) {
								alert('您的浏览器不支持此功能，请使用现代浏览器');
								console.error('Copy error:', e);
							}
						});
					}).catch(function(err) {
						document.body.removeChild(tempDiv);
						alert('生成图片失败');
						console.error('html2canvas error:', err);
					});
				};
				document.head.appendChild(script);
			}

			function closePoemModal() {
				var modal = document.getElementById('poemModal');
				if (modal) {
					modal.classList.remove('active');
					document.body.style.overflow = '';
				}
			}

			var todayPoems = getDailyPoems(3);
			renderDailyPoems(todayPoems);
			
			/********** 窗口大小改变时，重置报表大小 ********************/
			window.onresize = function() {
				// 图表响应式调整
			};
		});
		</script>
	</body>
