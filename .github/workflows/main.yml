# NewsFlow — RSS 新闻采集、词频分析、企业微信日报推送
# 文档: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: NewsFlow Daily

on:
  workflow_dispatch:   # 允许手动触发
  push:
    branches:
      - main
  schedule:
    # 北京时间每天 08:00、12:00、20:00（GitHub Actions 使用 UTC）
    - cron: "0 0 * * *"   # 08:00 CST
    - cron: "0 4 * * *"   # 12:00 CST
    - cron: "0 12 * * *"  # 20:00 CST

permissions:
  actions: write
  checks: write
  contents: write   # 需要 write 权限以提交 news.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip3 install requests

      - name: Run NewsFlow
        env:
          WEBHOOK_KEY: ${{ secrets.WEBHOOK_KEY }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
        run: python3 ./Src/main.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "chore: update news data [skip ci]"
          git push



